# Base de datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/MERPROYECTO?useSSL=false&serverTimezone=America/Santiago&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Linkpain3023
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
